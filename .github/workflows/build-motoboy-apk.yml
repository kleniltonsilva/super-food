name: Build Motoboy APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'motoboy-app/**'
      - 'restaurante-pedido-online/client/src/motoboy/**'
      - '.github/workflows/build-motoboy-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install monorepo dependencies
        working-directory: restaurante-pedido-online
        run: npm ci

      - name: Install motoboy-app dependencies
        working-directory: motoboy-app
        run: npm ci

      - name: Build web assets
        working-directory: motoboy-app
        run: |
          npm run build
          # Verificar que o CSS tem tamanho correto (Tailwind escaneou monorepo)
          CSS_FILE=$(ls -1 dist/assets/*.css | head -1)
          CSS_SIZE=$(stat -c%s "$CSS_FILE")
          echo "CSS size: ${CSS_SIZE} bytes"
          if [ "$CSS_SIZE" -lt 100000 ]; then
            echo "ERROR: CSS muito pequeno (${CSS_SIZE} bytes) — Tailwind não escaneou monorepo!"
            exit 1
          fi

      - name: Capacitor sync
        working-directory: motoboy-app
        run: npx cap copy android && npx cap sync android

      - name: Sync version.json → build.gradle
        working-directory: motoboy-app
        run: |
          VERSION=$(node -e "console.log(require('./version.json').version)")
          VERSION_CODE=$(node -e "console.log(require('./version.json').versionCode)")
          echo "Syncing version: ${VERSION} (code: ${VERSION_CODE})"
          sed -i "s/versionCode .*/versionCode ${VERSION_CODE}/" android/app/build.gradle
          sed -i "s/versionName .*/versionName \"${VERSION}\"/" android/app/build.gradle

      - name: Decode or generate keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.MOTOBOY_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.MOTOBOY_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.MOTOBOY_KEY_ALIAS }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Decoding existing keystore from secret..."
            echo "$KEYSTORE_BASE64" | base64 -d > motoboy-app/android/app/derekh-motoboy.jks
          else
            echo "Generating new keystore (save to secrets for consistency!)..."
            PASS="${KEYSTORE_PASSWORD:-DerekhFood2025Motoboy}"
            ALIAS="${KEY_ALIAS:-derekh-entregador}"
            keytool -genkeypair -v \
              -keystore motoboy-app/android/app/derekh-motoboy.jks \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -alias "$ALIAS" \
              -storepass "$PASS" -keypass "$PASS" \
              -dname "CN=Derekh Food, OU=Mobile, O=Derekh Food, L=Fortaleza, ST=CE, C=BR"
            echo ""
            echo "⚠️  IMPORTANT: Save this keystore as GitHub secret to keep consistent signing!"
            echo "Run: base64 motoboy-app/android/app/derekh-motoboy.jks | gh secret set MOTOBOY_KEYSTORE_BASE64"
            echo "Also set: MOTOBOY_KEYSTORE_PASSWORD=$PASS  MOTOBOY_KEY_ALIAS=$ALIAS  MOTOBOY_KEY_PASSWORD=$PASS"
            # Upload keystore as artifact for extraction
            cp motoboy-app/android/app/derekh-motoboy.jks /tmp/derekh-motoboy.jks
          fi

      - name: Build APK (always release signed)
        working-directory: motoboy-app/android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.MOTOBOY_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.MOTOBOY_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.MOTOBOY_KEY_PASSWORD }}
        run: |
          PASS="${KEYSTORE_PASSWORD:-DerekhFood2025Motoboy}"
          ALIAS="${KEY_ALIAS:-derekh-entregador}"
          KPASS="${KEY_PASSWORD:-DerekhFood2025Motoboy}"
          KEYSTORE_PATH="$(pwd)/app/derekh-motoboy.jks"
          echo "Keystore path: $KEYSTORE_PATH"
          echo "Building signed release APK..."
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password="$PASS" \
            -Pandroid.injected.signing.key.alias="$ALIAS" \
            -Pandroid.injected.signing.key.password="$KPASS"
          cp app/build/outputs/apk/release/app-release.apk ../DerekhFood-Entregador.apk

      - name: Clean keystore
        if: always()
        run: rm -f motoboy-app/android/app/derekh-motoboy.jks

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: derekh-entregador-apk
          path: motoboy-app/DerekhFood-Entregador.apk
          retention-days: 90

      - name: Upload keystore (if generated)
        if: hashFiles('/tmp/derekh-motoboy.jks') != ''
        uses: actions/upload-artifact@v4
        with:
          name: derekh-keystore-SAVE-TO-SECRETS
          path: /tmp/derekh-motoboy.jks
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: derekh-entregador-apk
          path: apk

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Upload APK to Fly.io volume
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          LOCAL_SIZE=$(stat -c%s apk/DerekhFood-Entregador.apk)
          echo "Local APK: ${LOCAL_SIZE} bytes"

          # Criar diretório + deletar APK antigo (flyctl sftp NÃO sobrescreve!)
          flyctl ssh console --app superfood-api -C "sh -c 'mkdir -p /app/backend/static/uploads/downloads && rm -f /app/backend/static/uploads/downloads/DerekhFood-Entregador.apk'"

          # Upload via SFTP
          flyctl ssh sftp shell --app superfood-api << 'SFTP_EOF'
          put apk/DerekhFood-Entregador.apk /app/backend/static/uploads/downloads/DerekhFood-Entregador.apk
          SFTP_EOF

          # Verificar upload — comparar tamanho
          REMOTE_SIZE=$(flyctl ssh console --app superfood-api -C "stat -c%s /app/backend/static/uploads/downloads/DerekhFood-Entregador.apk" 2>&1 | tail -1)
          echo "Remote APK: ${REMOTE_SIZE} bytes"
          if [ "$REMOTE_SIZE" != "$LOCAL_SIZE" ]; then
            echo "ERROR: Upload falhou! Local=${LOCAL_SIZE} Remote=${REMOTE_SIZE}"
            exit 1
          fi
          echo "Upload verificado com sucesso!"
