name: Build Motoboy APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'motoboy-app/**'
      - 'restaurante-pedido-online/client/src/motoboy/**'
      - '.github/workflows/build-motoboy-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Instalar deps do monorepo (necessário para imports com alias @)
      - name: Install monorepo dependencies
        working-directory: restaurante-pedido-online
        run: npm ci

      # Instalar deps do projeto Capacitor
      - name: Install motoboy-app dependencies
        working-directory: motoboy-app
        run: npm ci

      # Inicializar plataforma Android (se não existir)
      - name: Init Capacitor Android
        working-directory: motoboy-app
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      # Build web assets
      - name: Build web assets
        working-directory: motoboy-app
        run: npm run build

      # Sync com Android
      - name: Capacitor sync
        working-directory: motoboy-app
        run: |
          npx cap copy android
          npx cap sync android

      # Configurar permissões Android
      - name: Configure Android permissions
        working-directory: motoboy-app
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # Adicionar permissões necessárias se não existirem
          if ! grep -q "ACCESS_BACKGROUND_LOCATION" "$MANIFEST"; then
            sed -i '/<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/a \
    <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />' "$MANIFEST"
          fi
          if ! grep -q "FOREGROUND_SERVICE\"" "$MANIFEST"; then
            sed -i '/<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/a \
    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_LOCATION" />' "$MANIFEST"
          fi
          if ! grep -q "WAKE_LOCK" "$MANIFEST"; then
            sed -i '/<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/a \
    <uses-permission android:name="android.permission.WAKE_LOCK" />' "$MANIFEST"
          fi
          if ! grep -q "REQUEST_INSTALL_PACKAGES" "$MANIFEST"; then
            sed -i '/<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/a \
    <uses-permission android:name="android.permission.REQUEST_INSTALL_PACKAGES" />' "$MANIFEST"
          fi
          if ! grep -q "VIBRATE" "$MANIFEST"; then
            sed -i '/<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/a \
    <uses-permission android:name="android.permission.VIBRATE" />' "$MANIFEST"
          fi

      # Decodificar keystore
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.MOTOBOY_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > motoboy-app/android/app/derekh-motoboy.jks
          fi

      # Build APK release (assinado se keystore existir, debug caso contrário)
      - name: Build APK
        working-directory: motoboy-app/android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.MOTOBOY_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.MOTOBOY_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.MOTOBOY_KEY_PASSWORD }}
        run: |
          if [ -f "app/derekh-motoboy.jks" ] && [ -n "$KEYSTORE_PASSWORD" ]; then
            echo "Building signed release APK..."
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file=derekh-motoboy.jks \
              -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
              -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
              -Pandroid.injected.signing.key.password="$KEY_PASSWORD"
            cp app/build/outputs/apk/release/app-release.apk ../DerekhFood-Entregador.apk
          else
            echo "Building debug APK (no keystore configured)..."
            ./gradlew assembleDebug
            cp app/build/outputs/apk/debug/app-debug.apk ../DerekhFood-Entregador.apk
          fi

      # Limpar keystore
      - name: Clean keystore
        if: always()
        run: rm -f motoboy-app/android/app/derekh-motoboy.jks

      # Upload artifact
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: derekh-entregador-apk
          path: motoboy-app/DerekhFood-Entregador.apk
          retention-days: 90

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: derekh-entregador-apk
          path: apk

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Upload APK to Fly.io volume
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          # Criar diretório de downloads no volume
          flyctl ssh console --app superfood-api -C "mkdir -p /app/backend/static/uploads/downloads"

          # Upload APK
          echo "Uploading DerekhFood-Entregador.apk..."
          flyctl ssh sftp shell --app superfood-api <<EOF
          put apk/DerekhFood-Entregador.apk /app/backend/static/uploads/downloads/DerekhFood-Entregador.apk
          EOF

          # Verificar
          flyctl ssh console --app superfood-api -C "ls -la /app/backend/static/uploads/downloads/DerekhFood-Entregador.apk"
