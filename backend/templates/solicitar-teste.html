<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solicitar Teste Grátis — Derekh Food</title>
  <meta name="description" content="Solicite seu teste grátis de 15 dias do Derekh Food. Sistema completo de delivery para restaurantes, 0% comissão.">
  <link rel="icon" type="image/png" href="/static/logo-derekh.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-950 min-h-screen flex items-center justify-center p-4 font-sans">

  <div class="w-full max-w-lg">
    <!-- Logo + Header -->
    <div class="text-center mb-8">
      <img src="/static/logo-derekh.png" alt="Derekh Food" class="h-16 mx-auto mb-4" onerror="this.style.display='none'">
      <h1 class="text-3xl font-bold text-white mb-2">Teste Grátis 15 Dias</h1>
      <p class="text-slate-400">Preencha o formulário e ativamos seu sistema em até 48h. Sem cartão de crédito.</p>
    </div>

    <!-- Form Card -->
    <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 sm:p-8 shadow-xl">

      <form id="formTeste" class="space-y-4">
        <!-- Nome do Restaurante -->
        <div>
          <label for="nome_fantasia" class="block text-sm font-medium text-slate-300 mb-1">Nome do Restaurante *</label>
          <input type="text" id="nome_fantasia" name="nome_fantasia" required minlength="3"
            class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition"
            placeholder="Ex: Pizzaria do João">
        </div>

        <!-- Nome do Responsável -->
        <div>
          <label for="nome_responsavel" class="block text-sm font-medium text-slate-300 mb-1">Seu Nome *</label>
          <input type="text" id="nome_responsavel" name="nome_responsavel" required minlength="3"
            class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition"
            placeholder="Nome completo">
        </div>

        <!-- Email -->
        <div>
          <label for="email" class="block text-sm font-medium text-slate-300 mb-1">E-mail *</label>
          <input type="email" id="email" name="email" required
            class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition"
            placeholder="seu@email.com">
        </div>

        <!-- Telefone -->
        <div>
          <label for="telefone" class="block text-sm font-medium text-slate-300 mb-1">WhatsApp *</label>
          <input type="tel" id="telefone" name="telefone" required
            class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition"
            placeholder="(11) 99999-9999">
        </div>

        <!-- Cidade + Estado (row) -->
        <div class="grid grid-cols-3 gap-3">
          <div class="col-span-2">
            <label for="cidade" class="block text-sm font-medium text-slate-300 mb-1">Cidade</label>
            <input type="text" id="cidade" name="cidade"
              class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition"
              placeholder="São Paulo">
          </div>
          <div>
            <label for="estado" class="block text-sm font-medium text-slate-300 mb-1">UF</label>
            <input type="text" id="estado" name="estado" maxlength="2"
              class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition uppercase"
              placeholder="SP">
          </div>
        </div>

        <!-- Tipo -->
        <div>
          <label for="tipo_restaurante" class="block text-sm font-medium text-slate-300 mb-1">Tipo de Restaurante</label>
          <select id="tipo_restaurante" name="tipo_restaurante"
            class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-white focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition">
            <option value="geral">Selecione...</option>
            <option value="pizzaria">Pizzaria</option>
            <option value="hamburgueria">Hamburgueria</option>
            <option value="restaurante">Restaurante</option>
            <option value="acai">Açaí / Sorvete</option>
            <option value="sushi">Sushi / Japonês</option>
            <option value="padaria">Padaria / Confeitaria</option>
            <option value="marmita">Marmita / Quentinha</option>
            <option value="outro">Outro</option>
          </select>
        </div>

        <!-- Mensagem -->
        <div>
          <label for="mensagem" class="block text-sm font-medium text-slate-300 mb-1">Mensagem (opcional)</label>
          <textarea id="mensagem" name="mensagem" rows="3"
            class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition resize-none"
            placeholder="Conte-nos sobre seu restaurante..."></textarea>
        </div>

        <!-- Submit -->
        <button type="submit" id="btnSubmit"
          class="w-full py-4 bg-gradient-to-r from-orange-600 to-orange-500 text-white font-bold text-lg rounded-xl hover:from-orange-500 hover:to-orange-400 transition-all shadow-lg shadow-orange-500/25 flex items-center justify-center gap-2">
          <span id="btnText">Solicitar Teste Grátis</span>
          <svg id="btnSpinner" class="hidden w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
          </svg>
        </button>
      </form>

      <!-- Success message (hidden by default) -->
      <div id="successMsg" class="hidden text-center py-8">
        <div class="w-16 h-16 bg-emerald-500/20 rounded-full flex items-center justify-center mx-auto mb-4">
          <svg class="w-8 h-8 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
          </svg>
        </div>
        <h2 class="text-xl font-bold text-white mb-2">Solicitação Enviada!</h2>
        <p class="text-slate-400 mb-4">Entraremos em contato em até 48h para ativar seu teste grátis.</p>
        <a href="https://wa.me/351961330536?text=Olá Ana! Acabei de solicitar o teste grátis pelo site." target="_blank"
          class="inline-flex items-center gap-2 px-6 py-3 bg-emerald-600 text-white rounded-xl hover:bg-emerald-500 transition font-medium">
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          Falar com a Ana no WhatsApp
        </a>
      </div>

      <!-- Error message (hidden by default) -->
      <div id="errorMsg" class="hidden mt-4 p-4 bg-red-500/10 border border-red-500/20 rounded-xl text-red-400 text-sm text-center"></div>
    </div>

    <!-- Footer -->
    <div class="text-center mt-6 text-sm text-slate-500">
      <p>0% comissão · Setup em 48h · Suporte humano</p>
      <a href="https://derekhfood.com.br" class="text-orange-400 hover:text-orange-300">derekhfood.com.br</a>
    </div>
  </div>

  <script>
    // Phone mask
    document.getElementById('telefone').addEventListener('input', function(e) {
      let v = e.target.value.replace(/\D/g, '');
      if (v.length > 11) v = v.slice(0, 11);
      if (v.length > 6) {
        e.target.value = `(${v.slice(0,2)}) ${v.slice(2,7)}-${v.slice(7)}`;
      } else if (v.length > 2) {
        e.target.value = `(${v.slice(0,2)}) ${v.slice(2)}`;
      } else if (v.length > 0) {
        e.target.value = `(${v}`;
      }
    });

    // Form submit
    document.getElementById('formTeste').addEventListener('submit', async function(e) {
      e.preventDefault();

      const btn = document.getElementById('btnSubmit');
      const btnText = document.getElementById('btnText');
      const spinner = document.getElementById('btnSpinner');
      const errorMsg = document.getElementById('errorMsg');

      btn.disabled = true;
      btnText.textContent = 'Enviando...';
      spinner.classList.remove('hidden');
      errorMsg.classList.add('hidden');

      const data = {
        nome_fantasia: document.getElementById('nome_fantasia').value.trim(),
        nome_responsavel: document.getElementById('nome_responsavel').value.trim(),
        email: document.getElementById('email').value.trim(),
        telefone: document.getElementById('telefone').value.replace(/\D/g, ''),
        cidade: document.getElementById('cidade').value.trim() || null,
        estado: document.getElementById('estado').value.trim().toUpperCase() || null,
        tipo_restaurante: document.getElementById('tipo_restaurante').value,
        mensagem: document.getElementById('mensagem').value.trim() || null,
      };

      try {
        const resp = await fetch('/api/public/solicitar-cadastro', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });

        const result = await resp.json();

        if (resp.ok && result.sucesso) {
          document.getElementById('formTeste').classList.add('hidden');
          document.getElementById('successMsg').classList.remove('hidden');
        } else {
          errorMsg.textContent = result.detail || result.mensagem || 'Erro ao enviar. Tente novamente.';
          errorMsg.classList.remove('hidden');
          btn.disabled = false;
          btnText.textContent = 'Solicitar Teste Grátis';
          spinner.classList.add('hidden');
        }
      } catch (err) {
        errorMsg.textContent = 'Erro de conexão. Verifique sua internet e tente novamente.';
        errorMsg.classList.remove('hidden');
        btn.disabled = false;
        btnText.textContent = 'Solicitar Teste Grátis';
        spinner.classList.add('hidden');
      }
    });
  </script>

</body>
</html>
