# =============================================================================
# Derekh Food - Docker Compose (Producao)
# Uso: docker compose -f docker-compose.prod.yml up -d
# =============================================================================

services:
  # -------------------- PostgreSQL --------------------
  postgres:
    image: postgres:16-alpine
    container_name: superfood-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-superfood}
      POSTGRES_USER: ${POSTGRES_USER:-superfood}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-superfood}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  # -------------------- PgBouncer --------------------
  pgbouncer:
    image: edoburu/pgbouncer:1.22.0
    container_name: superfood-pgbouncer
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-superfood}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-superfood}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      MIN_POOL_SIZE: 5
    ports:
      - "6432:6432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 6432"]
      interval: 10s
      timeout: 5s
      retries: 3

  # -------------------- Redis --------------------
  redis:
    image: redis:7-alpine
    container_name: superfood-redis
    restart: always
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 300M

  # -------------------- API (Producao) --------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: superfood-api
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-superfood}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB:-superfood}
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
      SECRET_KEY: ${SECRET_KEY:?Defina SECRET_KEY}
      SUPER_ADMIN_USER: ${SUPER_ADMIN_USER:-superadmin}
      SUPER_ADMIN_PASS: ${SUPER_ADMIN_PASS:?Defina SUPER_ADMIN_PASS}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-}
      CDN_URL: ${CDN_URL:-}
    volumes:
      - uploads_data:/app/backend/static/uploads
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
      replicas: 2

  # -------------------- Caddy (Reverse Proxy + SSL) --------------------
  caddy:
    build:
      context: ./infra/caddy
      dockerfile: Dockerfile
    container_name: superfood-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  caddy_data:
  caddy_config:
