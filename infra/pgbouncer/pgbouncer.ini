; =============================================================================
; PgBouncer Configuration - Super Food
; =============================================================================

[databases]
superfood = host=postgres port=5432 dbname=superfood

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; Transaction pooling — melhor para web apps
pool_mode = transaction

; Conexoes
max_client_conn = 200
default_pool_size = 20
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3

; Timeouts
server_lifetime = 1800
server_idle_timeout = 600
client_idle_timeout = 300
query_timeout = 30

; Logging
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60

; Admin
admin_users = superfood
