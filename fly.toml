# =============================================================================
# Super Food API - Fly.io Configuration
# Regiao: gru (Sao Paulo) para menor latencia no Brasil
# =============================================================================

app = "superfood-api"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  ENVIRONMENT = "production"
  STORAGE_BACKEND = "local"
  LOG_LEVEL = "INFO"
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = "90s"
  interval = "30s"
  method = "GET"
  path = "/health/live"
  timeout = "10s"

[checks]
  [checks.health]
    grace_period = "90s"
    interval = "30s"
    method = "GET"
    path = "/health/ready"
    port = 8000
    timeout = "10s"
    type = "http"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

# Para escalar automaticamente:
# fly scale count 2 --max-per-region 4
# fly autoscale set min=1 max=4
